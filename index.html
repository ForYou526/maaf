<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Love Tree</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#1b1b1b;
color:white;
overflow:hidden;
transition:1s;
}

/* LOVE MODE */

.love-mode{
background: radial-gradient(circle,#ff4b7d,#300010);
}

/* BUTTON */

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
background:#444;
color:white;
transition:0.5s;
}

.love-mode button{
background:#ff2f6b;
}

/* TREE SECTION */

.tree-section{
display:none;
text-align:center;
}

/* HEART SEED */

.heart{
font-size:60px;
animation:heartbeat 1s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* TREE */

.tree{
margin-top:30px;
position:relative;
width:200px;
height:250px;
}

.trunk{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:20px;
height:120px;
background:#6b3e26;
border-radius:10px;
animation:growTrunk 3s forwards;
}

@keyframes growTrunk{
0%{height:0}
100%{height:120px}
}

/* LEAVES */

.leaves{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
font-size:40px;
animation:growLeaves 3s forwards;
}

@keyframes growLeaves{
0%{transform:translateX(-50%) scale(0)}
100%{transform:translateX(-50%) scale(1)}
}

/* FALLING HEARTS */

.fall{
position:fixed;
top:-20px;
color:#ff4b7d;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(110vh)}
}

/* TIMER */

.timer{
margin-top:40px;
font-size:28px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

</style>
</head>

<body>

<button onclick="startLove()">Aktifkan Love Mode ❤️</button>

<div class="tree-section" id="treeSection">

<div class="heart">❤️</div>

<div class="tree">

<div class="trunk"></div>

<div class="leaves">
❤️ ❤️ ❤️
</div>

</div>

<div class="timer">

<h2>Kita sudah bersama selama</h2>

<div id="time"></div>

</div>

</div>

<script>

/* LOVE MODE */

function startLove(){

document.body.classList.add("love-mode")

document.querySelector("button").style.display="none"

document.getElementById("treeSection").style.display="block"

createHearts()

}

/* FALLING HEARTS */

function createHearts(){

setInterval(()=>{

const heart=document.createElement("div")

heart.className="fall"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),5000)

},300)

}

/* LOVE TIMER */

const startDate=new Date("2024-10-25T00:00:00")

function updateTimer(){

const now=new Date()

const diff=now-startDate

const days=Math.floor(diff/(1000*60*60*24))

const hours=Math.floor(diff/(1000*60*60)%24)

const minutes=Math.floor(diff/(1000*60)%60)

const seconds=Math.floor(diff/1000%60)

document.getElementById("time").innerHTML=

days+" hari "+

hours+" jam "+

minutes+" menit "+

seconds+" detik ❤️"

}

setInterval(updateTimer,1000)

</script>

</body>
</html>
